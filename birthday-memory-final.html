<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Quest - Final</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { display: ["'Press Start 2P'", "ui-sans-serif", "system-ui", "sans-serif"], sans: ["'Pixelify Sans'", "ui-sans-serif", "system-ui", "sans-serif"] },
            colors: { cream: "#FFF8F1", apricot: "#FD6703", lavender: "#F3E8FF", cocoa: "#3A2723" },
            boxShadow: { pixel: "0 0 0 3px #3A2723, 8px 8px 0 rgba(58,39,35,.16)", button: "0 7px 0 #A94405, 0 16px 30px rgba(253,103,3,.2)" },
            keyframes: {
              shake: { "0%,100%": { transform: "translateX(0)" }, "20%": { transform: "translateX(-8px)" }, "40%": { transform: "translateX(7px)" }, "60%": { transform: "translateX(-5px)" }, "80%": { transform: "translateX(4px)" } },
              pop: { "0%": { opacity: "0", transform: "scale(.84)" }, "100%": { opacity: "1", transform: "scale(1)" } }
            },
            animation: { shake: "shake 360ms ease-in-out both", pop: "pop 360ms ease-out both" }
          }
        }
      };
    </script>
  </head>
  <body class="min-h-screen overflow-hidden bg-[#120D2B] font-sans text-cocoa antialiased">
    <main class="relative min-h-screen">
      <img src="assets/final-birthday-night.png" alt="" class="absolute inset-0 h-full w-full object-cover object-center" aria-hidden="true" />

      <section class="absolute left-[47.8%] top-[34%] w-[35vw] text-center">
        <div id="final-message" class="hidden animate-pop">
          <p class="font-display text-[clamp(14px,1.2vw,20px)] leading-8 text-apricot drop-shadow-[2px_2px_0_rgba(58,39,35,0.28)]">Quest Complete</p>
          <h1 class="mt-3 font-sans text-[clamp(46px,4.5vw,78px)] font-bold leading-none text-cocoa drop-shadow-[4px_4px_0_rgba(255,248,241,0.62)]">生日快樂</h1>
          <p class="mt-4 font-sans text-[clamp(24px,2vw,34px)] font-bold text-cocoa/72 drop-shadow-[2px_2px_0_rgba(255,248,241,0.72)]">Happy Birthday!</p>
          <a href="birthday-memory-extra-card.html" class="mt-5 inline-flex min-h-10 items-center justify-center border-4 border-[#7A4A2A] bg-[#F8A35B] px-4 font-display text-[clamp(9px,0.82vw,13px)] text-cocoa shadow-[0_5px_0_#A94405] transition active:translate-y-1 active:shadow-none">Open Birthday Card</a>
        </div>
      </section>

      <section id="card" class="absolute bottom-[5%] right-[4%] w-[min(820px,60vw)] min-w-[500px] border-4 border-[#7A4A2A] bg-[#F4D69C] p-3 shadow-pixel">
        <div class="relative border-4 border-[#C7944F] bg-[#FFF8F1]/96 px-6 py-5">
          <div class="absolute -top-4 left-1/2 h-7 w-7 -translate-x-1/2 rotate-45 border-4 border-[#7A4A2A] bg-[#5A8EE8]"></div>
          <div class="grid gap-3">
            <div class="flex items-center gap-3">
              <p class="shrink-0 whitespace-nowrap border-4 border-[#7A4A2A] bg-[#7A4A2A] px-4 py-2 font-display text-[clamp(9px,0.72vw,12px)] leading-5 text-white">Final</p>
              <div id="badge" class="flex h-10 w-10 shrink-0 items-center justify-center border-4 border-cocoa bg-lavender text-cocoa">
                <i data-lucide="lock-keyhole" class="h-5 w-5" aria-hidden="true"></i>
              </div>
              <div class="min-w-0">
                <h1 class="font-sans text-[clamp(30px,2.4vw,42px)] font-bold leading-8 text-cocoa">Assemble the message</h1>
                <p class="mt-1 text-[clamp(16px,1.12vw,20px)] font-bold leading-5 text-cocoa/68">Type all four clues in order, e.g. ㄅㄆㄇㄈ.</p>
              </div>
            </div>
            <form id="puzzle-form" class="grid gap-3 md:grid-cols-[1fr_170px] md:items-start">
              <label for="answer" class="sr-only">Final answer</label>
              <input id="answer" name="answer" autocomplete="off" class="min-h-[50px] w-full border-4 border-[#8D7A67] bg-white px-4 font-sans text-[clamp(22px,1.55vw,28px)] font-bold text-cocoa outline-none transition placeholder:text-cocoa/35 focus:border-apricot" placeholder="" aria-describedby="error final-message" />
              <button type="submit" class="inline-flex min-h-[50px] w-full items-center justify-center gap-2 border-4 border-[#7A4A2A] bg-[#F8A35B] px-4 font-display text-[clamp(10px,0.82vw,13px)] text-cocoa shadow-button transition active:translate-y-1 active:shadow-none" aria-label="Unlock final message">
                <i data-lucide="key-round" class="h-4 w-4" aria-hidden="true"></i>
                Unlock
              </button>
            </form>
          </div>
          <p id="error" class="mt-2 hidden border-4 border-cocoa bg-lavender px-4 py-2 font-sans text-lg font-bold text-cocoa" aria-live="polite"></p>
        </div>
      </section>
    </main>
    <script>
      const form = document.querySelector("#puzzle-form");
      const input = document.querySelector("#answer");
      const card = document.querySelector("#card");
      const badge = document.querySelector("#badge");
      const error = document.querySelector("#error");
      const finalMessage = document.querySelector("#final-message");
      const acceptedAnswers = new Set(["ㄕㄥㄖˋㄎㄨㄞˋㄌㄜˋ", "ㄕㄥ ㄖˋ ㄎㄨㄞˋ ㄌㄜˋ"]);
      const normalizeAnswer = (value) => value.trim().replace(/\s+/g, "");
      const handleSubmit = (event) => {
        event.preventDefault();
        if (acceptedAnswers.has(input.value.trim()) || acceptedAnswers.has(normalizeAnswer(input.value))) {
          error.classList.add("hidden");
          finalMessage.classList.remove("hidden");
          input.setAttribute("aria-invalid", "false");
          badge.innerHTML = '<i data-lucide="unlock-keyhole" class="h-5 w-5" aria-hidden="true"></i>';
          badge.classList.remove("bg-lavender");
          badge.classList.add("bg-[#FFF0E6]", "text-apricot");
          lucide.createIcons();
          return;
        }
        finalMessage.classList.add("hidden");
        error.textContent = "Not quite. Try again.";
        error.classList.remove("hidden");
        input.setAttribute("aria-invalid", "true");
        card.classList.remove("animate-shake");
        void card.offsetWidth;
        card.classList.add("animate-shake");
      };
      form.addEventListener("submit", handleSubmit);
      lucide.createIcons();
    </script>
  </body>
</html>
